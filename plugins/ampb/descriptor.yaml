plugin:
  name: ampb
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/ampb.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/ampb.vst3/Contents/$VST3_ARCH && cp target/release/libampb.so target/bundled/ampb.vst3/Contents/$VST3_ARCH/ampb.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/ampb.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - ampb.lv2
  modgui:
    brand: YimRakhee
    description: "Bass preamplifier plugin"
  dependencies: []
