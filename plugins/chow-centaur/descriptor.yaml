plugin:
  name: chow-centaur
  version: f3bb633a593b6fbb22a44c1ef9d1dbedbfe92d5b
  source:
    type: git
    url: https://github.com/jatinchowdhury18/KlonCentaur.git
  build:
    - git submodule update --init --recursive
    - cmake -Bbuild -DCMAKE_BUILD_TYPE=Release -DSKIP_LV2_TTL_GENERATOR=ON
    - cmake --build build --config Release -- -j2
  install:
    - cp -r build/ChowCentaur/ChowCentaur_artefacts/Release/LV2/ChowCentaur.lv2 ${LV2_DIR}/
  bundles:
    - ChowCentaur.lv2
  modgui:
    brand: Chow DSP
    color: green
    knob: silver
  dependencies:
    - libfreetype-dev
    - libx11-dev
    - libxrandr-dev
    - libxinerama-dev
    - libxcursor-dev
