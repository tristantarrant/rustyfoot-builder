plugin:
  name: cardinal
  version: 26.02
  source:
    type: git
    url: https://github.com/DISTRHO/Cardinal.git
  build:
    - git submodule update --init --recursive
    - make -j2 lv2 mini HEADLESS=true NOOPT=true
    - make -j2 gen HEADLESS=true NOOPT=true
    - cp -rn src/MOD/Cardinal.lv2/* bin/Cardinal.lv2/
    - cp -rn src/MOD/CardinalFX.lv2/* bin/CardinalFX.lv2/
    - cp -rn src/MOD/CardinalMini.lv2/* bin/CardinalMini.lv2/
  install:
    - cp -r bin/Cardinal.lv2 ${LV2_DIR}/
    - cp -r bin/CardinalFX.lv2 ${LV2_DIR}/
    - cp -r bin/CardinalMini.lv2 ${LV2_DIR}/
    - for b in Cardinal.lv2 CardinalFX.lv2 CardinalMini.lv2; do if [ -f ${LV2_DIR}/$b/modgui.ttl ] && ! grep -q 'modgui.ttl' ${LV2_DIR}/$b/manifest.ttl; then uri=$(grep -B1 'a lv2:Plugin' ${LV2_DIR}/$b/manifest.ttl | grep -oP '<[^>]+>' | grep -v 'lv2plug.in' | head -1); echo "$uri rdfs:seeAlso <modgui.ttl> ." >> ${LV2_DIR}/$b/manifest.ttl; fi; done
  bundles:
    - Cardinal.lv2
    - CardinalFX.lv2
    - CardinalMini.lv2
  dependencies:
    - libdbus-1-dev
    - liblo-dev
    - libfftw3-dev
    - libmagic-dev
    - libsndfile1-dev
