plugin:
  name: wstd-dlay
  version: main
  source:
    type: git
    url: https://github.com/Wasted-Audio/wstd-dlay.git
  build:
    - git submodule update --init --recursive
    - python3 -m venv /tmp/hvcc-venv
    - /tmp/hvcc-venv/bin/pip install git+https://github.com/Wasted-Audio/hvcc.git
    - PATH="/tmp/hvcc-venv/bin:$PATH" make build
  install:
    - cp -r bin/WSTD_DLAY.lv2 ${LV2_DIR}/
  bundles:
    - WSTD_DLAY.lv2
  dependencies:
    - python3-pip
