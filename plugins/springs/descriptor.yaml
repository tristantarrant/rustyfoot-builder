plugin:
  name: springs
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/springs.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/springs.vst3/Contents/$VST3_ARCH && cp target/release/libsprings.so target/bundled/springs.vst3/Contents/$VST3_ARCH/springs.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/springs.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - springs.lv2
  modgui:
    brand: YimRakhee
  dependencies: []
