plugin:
  name: letsdist
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/letsdist.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/letsdist.vst3/Contents/$VST3_ARCH && cp target/release/libletsdist.so target/bundled/letsdist.vst3/Contents/$VST3_ARCH/letsdist.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/letsdist.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - letsdist.lv2
  modgui:
    brand: YimRakhee
    description: "Aggressive distortion plugin for guitar"
  dependencies: []
