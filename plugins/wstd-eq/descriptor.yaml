plugin:
  name: wstd-eq
  version: master
  source:
    type: git
    url: https://github.com/Wasted-Audio/wstd-eq.git
  build:
    - git submodule update --init --recursive
    - python3 -m venv /tmp/hvcc-venv
    - /tmp/hvcc-venv/bin/pip install git+https://github.com/Wasted-Audio/hvcc.git
    - PATH="/tmp/hvcc-venv/bin:$PATH" HAVE_OPENGL=false HAVE_CAIRO=false HAVE_DGL=false make build
  install:
    - cp -r bin/WSTD_EQ.lv2 ${LV2_DIR}/
  bundles:
    - WSTD_EQ.lv2
  modgui:
    brand: Wasted Audio
    description: "Simple nasty EQ plugin"
  dependencies:
    - python3-pip
    - python3-venv
