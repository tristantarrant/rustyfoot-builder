plugin:
  name: fuzzb
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/fuzzb.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/fuzzb.vst3/Contents/$VST3_ARCH && cp target/release/libfuzzb.so target/bundled/fuzzb.vst3/Contents/$VST3_ARCH/fuzzb.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/fuzzb.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - fuzzb.lv2
  modgui:
    brand: YimRakhee
    description: "A destructive, synth-like bass fuzz plugin"
  dependencies: []
