plugin:
  name: ampg
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/ampg.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/ampg.vst3/Contents/$VST3_ARCH && cp target/release/libampg.so target/bundled/ampg.vst3/Contents/$VST3_ARCH/ampg.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/ampg.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - ampg.lv2
  modgui:
    brand: YimRakhee
    description: "Guitar amplifier plugin"
  dependencies: []
