plugin:
  name: suboctb
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/suboctb.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/suboctb.vst3/Contents/$VST3_ARCH && cp target/release/libsuboctb.so target/bundled/suboctb.vst3/Contents/$VST3_ARCH/suboctb.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/suboctb.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - suboctb.lv2
  modgui:
    brand: YimRakhee
    description: "Analog-style bass sub-octave synthesizer plugin"
  dependencies: []
