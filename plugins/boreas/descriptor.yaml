plugin:
  name: boreas
  version: main
  source:
    type: git
    url: https://github.com/stefdoerr/boreas.git
  build:
    - git submodule update --init --recursive
    - make HAVE_CAIRO=false HAVE_DGL=false HAVE_OPENGL=false
  install:
    - cp -r bin/boreas.lv2 ${LV2_DIR}/
  bundles:
    - boreas.lv2
  dependencies: []
