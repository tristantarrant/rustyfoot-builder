plugin:
  name: parkinsound-stepgate
  version: master
  source:
    type: git
    url: https://github.com/pilali/Parkinsound.git
  build:
    - make all
  install:
    - make install-all INSTALL_PATH=${LV2_DIR}
  bundles:
    - parkinsound-stepgate.lv2
    - parkinsound-stepgate4.lv2
  dependencies:
    - lv2-dev
