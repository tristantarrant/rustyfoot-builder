plugin:
  name: crushfuzz
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/crushfuzz.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/crushfuzz.vst3/Contents/$VST3_ARCH && cp target/release/libcrushfuzz.so target/bundled/crushfuzz.vst3/Contents/$VST3_ARCH/crushfuzz.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/crushfuzz.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - crushfuzz.lv2
  modgui:
    brand: YimRakhee
  dependencies: []
