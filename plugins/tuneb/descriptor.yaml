plugin:
  name: tuneb
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/tuneb.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/tuneb.vst3/Contents/$VST3_ARCH && cp target/release/libtuneb.so target/bundled/tuneb.vst3/Contents/$VST3_ARCH/tuneb.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/tuneb.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - tuneb.lv2
  modgui:
    brand: YimRakhee
    description: "Tuner plugin optimized for bass guitars"
  dependencies: []
