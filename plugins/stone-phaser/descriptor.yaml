plugin:
  name: stone-phaser
  version: master
  source:
    type: git
    url: https://github.com/jpcima/stone-phaser.git
  build:
    - make plugins BUILD_UI=false
    - make gen
  install:
    - cp -r bin/*.lv2 ${LV2_DIR}
  bundles:
    - stone-phaser.lv2
    - stone-phaser-stereo.lv2
  dependencies: []
