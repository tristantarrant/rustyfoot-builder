plugin:
  name: wstd-mseq
  version: main
  source:
    type: git
    url: https://github.com/Wasted-Audio/wstd-mseq.git
  build:
    - git submodule update --init --recursive
    - python3 -m venv /tmp/hvcc-venv
    - /tmp/hvcc-venv/bin/pip install git+https://github.com/Wasted-Audio/hvcc.git
    - PATH="/tmp/hvcc-venv/bin:$PATH" make build
  install:
    - cp -r bin/WSTD_MSEQ.lv2 ${LV2_DIR}/
  bundles:
    - WSTD_MSEQ.lv2
  modgui:
    brand: Wasted Audio
  dependencies:
    - python3-pip
    - python3-venv
