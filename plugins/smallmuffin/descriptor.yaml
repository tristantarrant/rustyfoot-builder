plugin:
  name: smallmuffin
  type: vst3
  version: main
  source:
    type: git
    url: https://codeberg.org/yimrakhee/smallmuffin.git
  build:
    - cargo build --release
    - VST3_ARCH=$(uname -m)-linux && mkdir -p target/bundled/smallmuffin.vst3/Contents/$VST3_ARCH && cp target/release/libsmallmuffin.so target/bundled/smallmuffin.vst3/Contents/$VST3_ARCH/smallmuffin.so
  install:
    - mkdir -p ${PREFIX_DIR}/lib/vst3
    - cp -rv target/bundled/smallmuffin.vst3 ${PREFIX_DIR}/lib/vst3/
  data:
    type: local
  bundles:
    - smallmuffin.lv2
  modgui:
    brand: YimRakhee
    description: "Vintage fuzz plugin for guitar and bass"
  dependencies: []
